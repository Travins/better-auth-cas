name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/better-auth-cas/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix packages/better-auth-cas

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./packages/better-auth-cas/package.json').version")"
          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version (v${TAG_VERSION}) does not match package version (${PACKAGE_VERSION})."
            exit 1
          fi

      - name: Build
        run: npm run --prefix packages/better-auth-cas build

      - name: Test
        run: npm run --prefix packages/better-auth-cas test

      - name: Verify OIDC token availability
        if: ${{ secrets.NPM_TOKEN == '' }}
        shell: bash
        run: |
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            echo "::error::OIDC token is unavailable. Ensure job permissions include id-token: write."
            exit 1
          fi

      - name: Publish with NPM_TOKEN
        if: ${{ secrets.NPM_TOKEN != '' }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./packages/better-auth-cas --access public

      - name: Publish with Trusted Publishing (OIDC)
        if: ${{ secrets.NPM_TOKEN == '' }}
        shell: bash
        run: npm publish ./packages/better-auth-cas --access public --provenance
